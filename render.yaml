services:
  # AI Quant (Flask Backend + 3D Frontend)
  - type: web
    name: ai-quant-stock
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: NEWSDATA_API_KEY
        sync: false  # Ensure to set this manually in the Render dashboard!
